<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Pony • Third-Party Test App</title>
    <style>
      :root {
        --bg-color: #0f0c1d;
        --card-bg: rgba(30, 30, 46, 0.7);
        --accent-gradient: linear-gradient(135deg, #cba6f7 0%, #89b4fa 100%);
        --input-bg: rgba(17, 17, 27, 0.6);
        --text-main: #cdd6f4;
        --text-dim: #bac2de;
        --glow: rgba(203, 166, 247, 0.3);
      }

      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        background-image:
          radial-gradient(circle at 20% 20%, rgba(137, 180, 250, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(203, 166, 247, 0.1) 0%, transparent 40%);
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }

      /* Subtle background animation */
      body::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: url('https://www.transparenttextures.com/patterns/cubes.png');
        opacity: 0.05;
        animation: moveBg 60s linear infinite;
        z-index: -1;
      }

      @keyframes moveBg {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-50%, -50%);
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 24px;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.4),
          inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }

      .card::after {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: var(--accent-gradient);
        z-index: -1;
        border-radius: 26px;
        opacity: 0.15;
      }

      h2 {
        margin: 0 0 30px 0;
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 8px;
        margin-left: 4px;
      }

      input {
        width: 100%;
        padding: 14px 18px;
        box-sizing: border-box;
        background: var(--input-bg);
        color: white;
        border: 1px solid rgba(69, 71, 90, 0.5);
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: #cba6f7;
        box-shadow: 0 0 15px var(--glow);
        background: rgba(30, 30, 46, 0.9);
      }

      button {
        background: var(--accent-gradient);
        color: #11111b;
        border: none;
        padding: 16px;
        cursor: pointer;
        border-radius: 14px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        margin-top: 15px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 20px rgba(203, 166, 247, 0.2);
      }

      button:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 15px 30px rgba(203, 166, 247, 0.4);
        filter: brightness(1.1);
      }

      button:active {
        transform: translateY(1px) scale(0.98);
      }

      iframe {
        display: none;
      }

      /* Decorative elements */
      .dot {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #cba6f7;
        border-radius: 50%;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Launch Tiny Pony</h2>

      <div class="input-group">
        <label>Target Client URL</label>
        <input type="text" id="targetUrl" value="http://localhost:8080" spellcheck="false" />
      </div>

      <div class="input-group">
        <label>Server IP Address</label>
        <input type="text" id="hostIp" value="192.168.1.100:8080" spellcheck="false" />
      </div>

      <div class="input-group">
        <label>Access Password</label>
        <input type="password" id="hostPass" value="mypassword" />
      </div>

      <button id="btnSend">Connect to Server</button>
    </div>

    <div id="iframeContainer"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
