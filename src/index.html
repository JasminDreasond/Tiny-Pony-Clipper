<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pony Clipper Settings</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
        --input-bg: #f5f5f5;
        --border-color: #cccccc;
        --scroll-thumb: #cba6f7;
        --scroll-thumb-hover: #b4befe;
        --advanced-bg: #f0f0f5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1e1e2e;
          --text-color: #e0e0e0;
          --input-bg: #2a2a35;
          --border-color: #444455;
          --scroll-thumb: #6c539a;
          --scroll-thumb-hover: #cba6f7;
          --advanced-bg: #181825;
        }
      }

      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }

      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .scroll-content {
        flex: 1;
        overflow-y: auto;
        padding-right: 15px;
        margin-bottom: 20px;
      }

      .footer {
        flex-shrink: 0;
      }

      h2,
      h3 {
        margin-top: 0;
      }

      .advanced-section {
        margin-top: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group-sm {
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .label-sm {
        font-size: 14px;
        margin-bottom: 4px;
      }

      input[type='text'],
      input[type='number'],
      select {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 6px;
        background-color: var(--input-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #cba6f7;
      }
      .shortcut-input {
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }
      button {
        padding: 12px 20px;
        background: #cba6f7;
        color: #11111b;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
      }
      button:hover {
        background: #b4befe;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .row input {
        flex-grow: 1;
      }
      .row button {
        width: auto;
      }
      .checkbox-label {
        font-weight: normal;
        cursor: pointer;
      }
      .github-btn {
        background: #313244;
        color: #cdd6f4;
        margin-top: 15px;
      }
      .github-btn:hover {
        background: #45475a;
      }
    </style>
  </head>
  <body>
    <div class="scroll-content">
      <h2>Hardware & Recording Settings</h2>

      <div class="form-group">
        <label for="sysInput">System Audio Output (Desktop Sound)</label>
        <select id="sysInput"></select>
      </div>

      <div class="form-group">
        <label for="micInput">Microphone Input</label>
        <select id="micInput">
          <option value="none">Disabled</option>
        </select>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="separateAudio" /> Separate Microphone Audio Track
        </label>
      </div>

      <div class="form-group">
        <label for="bufferMinutes">Buffer Size (Minutes)</label>
        <input type="number" id="bufferMinutes" min="1" max="120" />
      </div>

      <div class="form-group">
        <label for="shortcutKey">Clip Shortcut (Click and press keys)</label>
        <input
          type="text"
          id="shortcutKey"
          class="shortcut-input"
          readonly
          placeholder="Press a key combination..."
        />
      </div>

      <div class="form-group">
        <label>Save Directory</label>
        <div class="row">
          <input type="text" id="savePath" readonly />
          <button id="btnBrowse">Browse Folder</button>
        </div>
      </div>

      <div class="advanced-section">
        <h3>Advanced FFmpeg Parameters</h3>
        <p style="font-size: 13px; margin-top: 0; color: #888">
          Only modify these if you know what you are doing. Default is optimized for NVIDIA GPUs.
        </p>

        <div class="row">
          <div class="form-group-sm" style="flex: 1">
            <label class="label-sm" for="videoCodec">Video Codec</label>
            <input type="text" id="videoCodec" placeholder="h264_nvenc, libx264, etc." />
          </div>
          <div class="form-group-sm" style="flex: 1">
            <label class="label-sm" for="audioCodec">Audio Codec</label>
            <input type="text" id="audioCodec" placeholder="aac, libopus, etc." />
          </div>
        </div>

        <div class="row">
          <div class="form-group-sm" style="flex: 1">
            <label class="label-sm" for="videoPreset">Video Preset</label>
            <input type="text" id="videoPreset" placeholder="p6, fast, slow, etc." />
          </div>
          <div class="form-group-sm" style="flex: 1">
            <label class="label-sm" for="videoQualityCmd">Quality Command</label>
            <input type="text" id="videoQualityCmd" placeholder="-cq, -crf, etc." />
          </div>
          <div class="form-group-sm" style="flex: 1">
            <label class="label-sm" for="videoQualityValue">Quality Value</label>
            <input type="text" id="videoQualityValue" placeholder="19, 23, etc." />
          </div>
        </div>
      </div>

      <button id="btnGithub" class="github-btn">💖 Contribute on GitHub (Code & Donations)</button>
    </div>

    <div class="footer">
      <button id="btnApply">Save Configuration & Restart Recording</button>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
