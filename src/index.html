<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pony Clipper Settings</title>
    <style>
        body { font-family: sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 8px; box-sizing: border-box;
            background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px;
        }
        button {
            padding: 10px 15px; background: #cba6f7; color: #11111b; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #b4befe; }
        .row { display: flex; gap: 10px; }
        .row input { flex-grow: 1; }
    </style>
</head>
<body>
    <h2>Recording Settings</h2>
    
    <div class="form-group">
        <label for="bufferMinutes">Buffer Size (Minutes)</label>
        <input type="number" id="bufferMinutes" value="5" min="1" max="120">
    </div>

    <div class="form-group">
        <label for="sysInput">System Audio Pulse ID</label>
        <input type="text" id="sysInput" value="default">
    </div>

    <div class="form-group">
        <label for="micInput">Microphone Pulse ID</label>
        <input type="text" id="micInput" value="default">
    </div>

    <div class="form-group">
        <label>
            <input type="checkbox" id="separateAudio" checked>
            Separate Microphone Audio Track
        </label>
    </div>

    <div class="form-group">
        <label for="shortcutKey">Clip Shortcut</label>
        <input type="text" id="shortcutKey" value="F10">
    </div>

    <div class="form-group">
        <label>Save Directory</label>
        <div class="row">
            <input type="text" id="savePath" readonly>
            <button id="btnBrowse">Browse</button>
        </div>
    </div>

    <button id="btnApply">Apply and Start Recording</button>

    <script type="module" src="./renderer.js"></script>
</body>
</html>
