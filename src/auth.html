<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Alert</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1e1e2e;
        color: #cdd6f4;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        box-sizing: border-box;
        text-align: center;
      }
      .warning-icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .app-path {
        background-color: #11111b;
        color: #f38ba8;
        padding: 10px;
        border-radius: 6px;
        font-family: monospace;
        word-break: break-all;
        margin: 15px 0;
        width: 100%;
        box-sizing: border-box;
      }
      .btn-container {
        display: flex;
        gap: 15px;
        width: 100%;
        margin-top: 10px;
      }
      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }
      .btn-allow {
        background-color: #a6e3a1;
        color: #11111b;
      }
      .btn-deny {
        background-color: #f38ba8;
        color: #11111b;
      }
    </style>
  </head>
  <body>
    <div class="warning-icon">⚠️</div>
    <h2 style="margin: 0; color: #f9e2af">Permission Required</h2>
    <p>A third-party application is trying to execute a CLI command in Tiny Pony Clipper.</p>

    <div class="app-path" id="appName">Loading path...</div>

    <p style="font-size: 12px; color: #bac2de">
      Do you want to allow this application to control the CLI?
    </p>

    <div class="btn-container">
      <button class="btn-deny" id="btnDeny">Deny</button>
      <button class="btn-allow" id="btnAllow">Allow</button>
    </div>

    <script>
      let currentCaller = '';

      window.electronAPI.onAuthRequest((caller) => {
        currentCaller = caller;
        document.getElementById('appName').innerText = caller;
      });

      document.getElementById('btnAllow').addEventListener('click', () => {
        window.electronAPI.sendAuthResponse({ caller: currentCaller, allowed: true });
      });

      document.getElementById('btnDeny').addEventListener('click', () => {
        window.electronAPI.sendAuthResponse({ caller: currentCaller, allowed: false });
      });
    </script>
  </body>
</html>
