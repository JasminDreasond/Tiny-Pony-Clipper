<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pony Stream Client</title>
    <style>
      body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-family: sans-serif;
        overflow: hidden;
      }
      video {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        background: #111;
      }
      #login {
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 10;
        position: absolute;
      }
      input,
      button {
        padding: 12px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
      }
      button {
        background-color: #cba6f7;
        color: #11111b;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #b4befe;
      }

      /* HUD Debug Panel */
      #debugPanel {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(24, 24, 37, 0.9);
        border: 1px solid #cba6f7;
        padding: 15px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 13px;
        color: #cdd6f4;
        pointer-events: none;
        min-width: 280px;
        z-index: 100;
        transition:
          opacity 0.3s,
          transform 0.3s;
      }
      #debugPanel.hidden {
        opacity: 0;
        transform: translateY(-20px);
        pointer-events: none;
      }

      /* Toggle Button */
      #btnToggleDebug {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 101;
        padding: 8px 12px;
        font-size: 12px;
        background: rgba(49, 50, 68, 0.7);
        color: #cdd6f4;
        border: 1px solid #45475a;
        opacity: 0.6;
      }
      #btnToggleDebug:hover {
        opacity: 1;
        background: rgba(49, 50, 68, 1);
      }

      .debug-section {
        margin-bottom: 10px;
        border-bottom: 1px solid #45475a;
        padding-bottom: 5px;
      }
      .debug-header {
        color: #cba6f7;
        font-weight: bold;
        margin-bottom: 4px;
        display: block;
      }
      .debug-row {
        margin-bottom: 3px;
        display: flex;
        justify-content: space-between;
      }
      .debug-val {
        font-weight: bold;
        color: #a6e3a1;
        text-align: right;
      }
      .debug-err {
        color: #f38ba8;
      }
      .debug-warn {
        color: #fab387;
      }

      #dbgInput {
        margin-top: 5px;
        font-size: 11px;
        color: #bac2de;
        line-height: 1.4;
      }

      .gamepad-only-msg {
        display: none;
        position: absolute;
        top: 15%;
        color: #cba6f7;
        font-size: 26px;
        font-weight: bold;
        text-align: center;
        width: 100%;
        text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8);
      }

      /* Estilização para quando o modo Video é desligado */
      body.gamepad-only-mode video {
        display: none !important;
      }

      body.gamepad-only-mode #debugPanel {
        position: static;
        margin: 0 auto;
        transform: scale(1.3);
        pointer-events: auto;
      }

      body.gamepad-only-mode #debugPanel.hidden {
        opacity: 1; /* Força ele a ficar visível neste modo */
        transform: scale(1.3);
      }

      body.gamepad-only-mode .gamepad-only-msg {
        display: block;
      }

      body.gamepad-only-mode #btnToggleDebug {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="gamepad-only-msg">🎮 Remote Gamepad Active - Video Disabled</div>
    <button id="btnToggleDebug">Hide Debug (F2)</button>

    <div id="debugPanel">
      <div class="debug-section">
        <span class="debug-header">Network & Signaling</span>
        <div class="debug-row">
          Signaling (WS): <span id="dbgWs" class="debug-val debug-err">Disconnected</span>
        </div>
        <div class="debug-row">
          RTC Conn State: <span id="dbgRtcConn" class="debug-val debug-err">New</span>
        </div>
        <div class="debug-row">
          ICE Conn State: <span id="dbgRtcIce" class="debug-val debug-err">New</span>
        </div>
      </div>

      <div class="debug-section">
        <span class="debug-header">Video Stream</span>
        <div class="debug-row">
          Track Status: <span id="dbgVidTrack" class="debug-val debug-err">Waiting...</span>
        </div>
        <div class="debug-row">
          Playback: <span id="dbgVidPlay" class="debug-val debug-err">Stopped</span>
        </div>
        <div class="debug-row">Resolution: <span id="dbgVidRes" class="debug-val">0x0</span></div>
      </div>

      <div class="debug-section" style="border: none; margin: 0; padding: 0">
        <span class="debug-header"
          >Input (DataChannel: <span id="dbgDc" class="debug-err">Closed</span>)</span
        >
        <div class="debug-row">
          Gamepad: <span id="dbgPad" class="debug-val debug-warn">Awaiting Input...</span>
        </div>
        <div id="dbgInput">Move sticks or press buttons.</div>
      </div>
    </div>

    <div id="login">
      <h2 style="text-align: center; color: #cba6f7; margin-top: 0">Pony Stream</h2>
      <input type="password" id="pass" placeholder="Password" />
      <label style="color: #cdd6f4; font-size: 14px; display: flex; gap: 8px">
        <input type="checkbox" id="wantsAudio" checked /> Enable Audio Stream
      </label>
      <button id="btnConnect">Connect & Play</button>
    </div>

    <video id="streamView" autoplay playsinline muted></video>

    <script type="module">
      /** @type {HTMLVideoElement} */
      const video = document.getElementById('streamView');
      /** @type {HTMLInputElement} */
      const passInput = document.getElementById('pass');
      /** @type {HTMLButtonElement} */
      const btnConnect = document.getElementById('btnConnect');
      /** @type {HTMLElement} */
      const loginDiv = document.getElementById('login');
      /** @type {HTMLButtonElement} */
      const btnToggleDebug = document.getElementById('btnToggleDebug');
      /** @type {HTMLElement} */
      const debugPanel = document.getElementById('debugPanel');
      /** @type {HTMLInputElement} */
      const wantsAudioInput = document.getElementById('wantsAudio');

      // Debug Elements
      const dbgWs = document.getElementById('dbgWs');
      const dbgRtcConn = document.getElementById('dbgRtcConn');
      const dbgRtcIce = document.getElementById('dbgRtcIce');
      const dbgVidTrack = document.getElementById('dbgVidTrack');
      const dbgVidPlay = document.getElementById('dbgVidPlay');
      const dbgVidRes = document.getElementById('dbgVidRes');
      const dbgDc = document.getElementById('dbgDc');
      const dbgPad = document.getElementById('dbgPad');
      const dbgInput = document.getElementById('dbgInput');

      /** @type {string[]} */
      let iceServerUrls = ['stun:stun.l.google.com:19302'];

      /** @type {boolean} */
      let expectVideo = true;

      // Recuperar senha do cache
      window.onload = () => {
        /** @type {string | null} */
        const cachedPass = localStorage.getItem('pony_stream_pass');
        if (cachedPass) {
          passInput.value = cachedPass;
        }
      };

      // Apertar Enter no campo de senha envia o formulário
      passInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          initConnection();
        }
      });

      /** @type {WebSocket | null} */
      let ws = null;
      /** @type {RTCPeerConnection | null} */
      let pc = null;
      /** @type {RTCDataChannel | null} */
      let dataChannel = null;
      /** @type {boolean} */
      let audioRequested = true;

      // The Gamepad Cache Map
      /** @type {Map<number, boolean>} */
      const activeGamepadsCache = new Map();

      // --- UI & DEBUG LOGIC ---

      /**
       * @param {HTMLElement} el
       * @param {string} text
       * @param {'error' | 'warn' | 'ok'} [state]
       */
      const updateDebug = (el, text, state) => {
        el.textContent = text;
        el.classList.remove('debug-err', 'debug-warn');
        if (state === 'error') el.classList.add('debug-err');
        else if (state === 'warn') el.classList.add('debug-warn');
      };

      const toggleDebug = () => {
        const isHidden = debugPanel.classList.toggle('hidden');
        btnToggleDebug.textContent = isHidden ? 'Show Debug (F2)' : 'Hide Debug (F2)';
        btnToggleDebug.blur(); // Remove foco do botão
      };

      btnToggleDebug.addEventListener('click', toggleDebug);

      // Atalho de teclado F2 para toggle
      window.addEventListener('keydown', (e) => {
        if (e.key === 'F2') {
          e.preventDefault();
          toggleDebug();
        }
      });

      // --- GAMEPAD DETECTION (CACHE SYSTEM) ---

      window.addEventListener('gamepadconnected', (event) => {
        activeGamepadsCache.set(event.gamepad.index, true);
        console.log('[INPUT] Gamepad connected:', event.gamepad.id);
      });

      window.addEventListener('gamepaddisconnected', (event) => {
        activeGamepadsCache.delete(event.gamepad.index);
        console.log('[INPUT] Gamepad disconnected:', event.gamepad.index);
      });

      // --- NETWORKING ---

      const initConnection = () => {
        updateDebug(dbgWs, 'Connecting...', 'warn');
        btnConnect.disabled = true;
        btnConnect.textContent = 'Connecting...';

        // Usa a porta atual do navegador para o WebSocket
        ws = new WebSocket(`ws://${window.location.host}`);

        ws.onopen = () => {
          updateDebug(dbgWs, 'Auth...', 'warn');
          audioRequested = wantsAudioInput.checked;
          ws.send(
            JSON.stringify({ type: 'auth', password: passInput.value, audio: audioRequested }),
          );
        };

        ws.onclose = () => {
          updateDebug(dbgWs, 'Disconnected', 'error');
          btnConnect.disabled = false;
          btnConnect.textContent = 'Connect & Play';
        };

        ws.onerror = () => updateDebug(dbgWs, 'Error', 'error');

        ws.onmessage = async (event) => {
          /** @type {Object} */
          const data = JSON.parse(event.data);

          if (data.type === 'auth_success') {
            // Salva no cache
            localStorage.setItem('pony_stream_pass', passInput.value);

            updateDebug(dbgWs, 'Connected', 'ok');
            loginDiv.style.display = 'none';

            // Define se vamos ou não tratar video
            expectVideo = data.enableVideo;

            // Flexibiliza o STUN server enviando pelo config
            if (data.iceServers) {
              /** @type {string[]} */
              const parsedUrls = data.iceServers
                .split(',')
                .map((s) => s.trim())
                .filter((s) => s);
              if (parsedUrls.length > 0) iceServerUrls = parsedUrls;
              console.log(`[HOST-ICE-SERVERS]`, parsedUrls);
            }

            if (!expectVideo) {
              document.body.classList.add('gamepad-only-mode');
              audioRequested = false;
              // Ajusta o Debug de vídeo já que não usaremos
              updateDebug(dbgVidTrack, 'Disabled', 'warn');
              updateDebug(dbgVidPlay, 'Disabled', 'warn');
            }

            setupWebRTC();
          } else if (data.type === 'auth_error') {
            updateDebug(dbgWs, 'Auth Failed', 'error');
            alert('Wrong password!');
            btnConnect.disabled = false;
            btnConnect.textContent = 'Connect & Play';
            ws.close();
          } else if (data.type === 'answer') {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
          } else if (data.type === 'ice_candidate') {
            if (data.candidate && data.candidate.candidate) {
              await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
          } else if (data.type === 'server_warning') {
            updateDebug(dbgPad, 'Limit Reached!', 'error');
            dbgInput.innerHTML += `<br><span style="color:#f38ba8; font-weight:bold;">${data.message}</span>`;
            console.warn('[SERVER WARNING]', data.message);
          }
        };
      };

      const setupWebRTC = async () => {
        updateDebug(dbgRtcConn, 'Initializing...', 'warn');

        // Configuração padrão usando STUN público do Google
        pc = new RTCPeerConnection({ iceServers: [{ urls: iceServerUrls }] });

        // Configuração do DataChannel para Inputs (Não confiável/Ordenado para latência mínima)
        dataChannel = pc.createDataChannel('gamepad', { ordered: false, maxRetransmits: 0 });

        dataChannel.onopen = () => updateDebug(dbgDc, 'Open', 'ok');
        dataChannel.onclose = () => updateDebug(dbgDc, 'Closed', 'error');
        dataChannel.onmessage = (event) => {
          /** @type {Object} */
          const msg = JSON.parse(event.data);
          if (msg.type === 'vibration') {
            /** @type {Gamepad[]} */
            const gamepads = navigator.getGamepads();
            /** @type {Gamepad | null} */
            const gp = gamepads[msg.index];

            if (gp && gp.vibrationActuator) {
              gp.vibrationActuator.playEffect('dual-rumble', {
                startDelay: 0,
                duration: msg.duration || 200,
                weakMagnitude: msg.weak || 0.5,
                strongMagnitude: msg.strong || 0.5,
              });
            }
          }
        };

        // Monitoramento de Estados da Conexão
        pc.onconnectionstatechange = () => {
          const s = pc.connectionstate;
          updateDebug(
            dbgRtcConn,
            s,
            s === 'disconnected' || s === 'failed' ? 'error' : s === 'connected' ? 'ok' : 'warn',
          );
        };

        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          updateDebug(
            dbgRtcIce,
            s,
            s === 'disconnected' || s === 'failed' ? 'error' : s === 'connected' ? 'ok' : 'warn',
          );
        };

        // --- VIDEO DEBUGGING LOGIC ---

        if (expectVideo) {
          pc.ontrack = (event) => {
            console.log('[WEBRTC] Video track received:', event.track);
            updateDebug(dbgVidTrack, `Recv (${event.track.kind})`, 'ok');

            if (video.srcObject !== event.streams[0]) {
              video.srcObject = event.streams[0];

              // Tenta forçar o playback. Navegadores exigem muted para autoplay sem interação.
              video
                .play()
                .then(() => {
                  updateDebug(dbgVidPlay, 'Playing', 'ok');
                })
                .catch((error) => {
                  console.error('[VIDEO ERROR] Autoplay blocked:', error);
                  updateDebug(dbgVidPlay, 'Blocked (Click Video)', 'error');

                  // Adiciona um ouvinte único: se o usuário clicar no vídeo, tenta dar play.
                  video.addEventListener(
                    'click',
                    () => {
                      video.play();
                      video.muted = false; // Tenta desmutar após o clique
                    },
                    { once: true },
                  );
                });
            }
          };
        }

        // Detecta resolução real quando o vídeo começa a rodar
        video.onloadedmetadata = () => {
          updateDebug(dbgVidRes, `${video.videoWidth}x${video.videoHeight}`, 'ok');
        };

        video.onerror = (e) => {
          updateDebug(dbgVidPlay, `Error: ${video.error.code}`, 'error');
          console.error('[VIDEO ELEMENT ERROR]', video.error);
        };

        pc.onicecandidate = (event) => {
          if (event.candidate && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ice_candidate', candidate: event.candidate }));
          }
        };

        // Criação da Oferta (Nós somos o cliente, iniciamos a conexão)
        /** @type {RTCSessionDescriptionInit} */
        const offer = await pc.createOffer({
          offerToReceiveVideo: true,
          offerToReceiveAudio: audioRequested,
        });
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', offer: offer }));

        requestAnimationFrame(pollGamepad);
      };

      // --- EFFICIENT POLLING WITH CACHE ---

      const pollGamepad = () => {
        /** @type {Gamepad[]} */
        const gamepads = navigator.getGamepads();
        /** @type {Object[]} */
        const padData = [];
        /** @type {string} */
        let debugText = '';

        // Iterate ONLY over pads we verified through events
        for (const [index, isValid] of activeGamepadsCache.entries()) {
          /** @type {Gamepad | null} */
          const gp = gamepads[index];

          // STRICT CHECK: Ensure the gamepad is actually connected to avoid ghosts
          if (gp && gp.connected) {
            /** @type {Object[]} */
            const buttonsData = gp.buttons.map((b) => ({
              pressed: b.pressed,
              value: b.value,
            }));

            /** @type {number[]} */
            const axesVals = gp.axes;

            padData.push({
              index: gp.index,
              buttons: buttonsData,
              axes: axesVals,
            });

            /** @type {number} */
            const activeBtnsCount = buttonsData.reduce(
              (acc, val) => acc + (val.pressed ? 1 : 0),
              0,
            );
            /** @type {string} */
            const lx = axesVals[0]?.toFixed(2) || '0.00';
            /** @type {string} */
            const ly = axesVals[1]?.toFixed(2) || '0.00';
            /** @type {string} */
            const rx = axesVals[2]?.toFixed(2) || '0.00';
            /** @type {string} */
            const ry = axesVals[3]?.toFixed(2) || '0.00';

            debugText +=
              `<span style="color:#cba6f7;">Pad [${gp.index}]</span> - Btns Active: ${activeBtnsCount}<br>` +
              `L: ${lx}, ${ly} | R: ${rx}, ${ry}<br><br>`;
          } else {
            // Cleanup ghost disconnections
            activeGamepadsCache.delete(index);
          }
        }

        if (padData.length > 0) {
          updateDebug(dbgPad, `Active Pads: ${padData.length}`, 'ok');
          if (dbgInput && !dbgInput.innerHTML.includes('blocked: Server max limit')) {
            dbgInput.innerHTML = debugText;
          }
          if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'multi_input', pads: padData }));
          }
        } else {
          updateDebug(dbgPad, 'Awaiting Input...', 'warn');
          if (dbgInput && !dbgInput.innerHTML.includes('blocked: Server max limit')) {
            dbgInput.textContent = 'Move sticks or press buttons.';
          }
        }

        requestAnimationFrame(pollGamepad);
      };

      btnConnect.addEventListener('click', initConnection);
    </script>
  </body>
</html>
